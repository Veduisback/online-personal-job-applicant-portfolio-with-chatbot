<!DOCTYPE html>
<html>

<head>

<title>AI Portfolio</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>


<body class="bg-black text-white">


<div class="min-h-screen grid md:grid-cols-3">


<!-- PROFILE SECTION -->

<div class="md:col-span-2 p-10">


<h1 id="name"
class="text-5xl font-bold mb-5">
Loading...
</h1>


<p id="bio"
class="text-gray-300 text-lg mb-8">
</p>



<h2 class="text-2xl font-bold">
Skills
</h2>


<p id="skills"
class="mt-3 text-gray-400">
</p>



<h2 class="text-2xl font-bold mt-10">
Education
</h2>


<p id="education"
class="text-gray-400 mt-3">
</p>



<h2 class="text-2xl font-bold mt-10">
Projects
</h2>



<div id="projects"
class="mt-5 space-y-5">
</div>



</div>




<!-- CHATBOT -->

<div class="border-l border-zinc-800 p-5 flex flex-col">


<h2 class="text-xl font-bold mb-5">
Ask AI about this candidate
</h2>


<div id="chatBox"
class="flex-1 overflow-y-auto space-y-3">

</div>



<div class="flex mt-5">


<input
id="message"
class="flex-1 bg-zinc-900 p-3 rounded"
placeholder="Ask something..."
>


<button
onclick="sendMessage()"
class="bg-white text-black px-5 rounded ml-2">

Send

</button>


</div>


</div>



</div>



<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>


<script src="firebase.js"></script>

<script src="portfolio.js"></script>


</body>

</html>

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Portfolio Builder</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="firebase-config.js"></script>

</head>

<body class="bg-black text-white">

<nav class="flex justify-between items-center px-8 py-5 border-b border-zinc-800">
    <h1 class="text-2xl font-bold">AI Portfolio Builder</h1>

```
<button onclick="googleLogin()"
    class="bg-white text-black px-5 py-2 rounded-lg font-semibold">
    Login with Google
</button>
```

</nav>

<section class="min-h-[80vh] flex flex-col justify-center items-center text-center px-5">

```
<h1 class="text-6xl font-bold mb-6">
    Build Your AI Portfolio
</h1>

<p class="text-zinc-400 text-lg max-w-2xl">
    Create your own AI-powered professional profile website
    that answers questions about your education, projects,
    skills and achievements.
</p>

<button onclick="googleLogin()"
    class="mt-8 bg-blue-600 hover:bg-blue-700 px-8 py-4 rounded-xl text-lg">
    Get Started
</button>
```

</section>

<script>

auth.onAuthStateChanged((user)=>{
    if(user){
        window.location.href="dashboard.html";
    }
});

function googleLogin(){

    const provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)
    .then(()=>{
        window.location.href="dashboard.html";
    })
    .catch((err)=>{
        alert(err.message);
    });

}

</script>

</body>
</html>
